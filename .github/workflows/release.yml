# .github/workflows/release.yml
#
# Publishes a signed release to Sonatype Central whenever a version tag is pushed.
#
# Usage:
#   git tag v0.9.3
#   git push origin v0.9.3
#
# Required GitHub Actions secrets (Settings → Secrets and variables → Actions):
#   SONATYPE_USERNAME  — user token name from central.sonatype.com → View Account → Generate User Token
#   SONATYPE_PASSWORD  — user token password (same page)
#   PGP_PASSPHRASE     — passphrase for the GPG key used by sbt-pgp / publishSigned
#   PGP_SECRET         — armored private key: gpg --armor --export-secret-keys <KEY_ID> | base64
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Publish to Sonatype Central
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install sbt
        run: |
          curl -L https://github.com/sbt/sbt/releases/download/v1.10.11/sbt-1.10.11.tgz | tar xz
          sudo mv sbt/bin/sbt /usr/local/bin/

      - name: Import GPG key
        run: |
          echo "${{ secrets.PGP_SECRET }}" | base64 --decode | gpg --batch --import

      - name: Publish signed artifacts to Sonatype Central
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          PGP_PASSPHRASE:    ${{ secrets.PGP_PASSPHRASE }}
        run: sbt +publishSigned sonatypeBundleRelease
